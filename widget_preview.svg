<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360" font-family="'JetBrains Mono','DejaVu Sans Mono',monospace">
  <rect width="760" height="360" fill="#1a1c28"/>

  <!-- RUNNING STATE -->
  <g transform="translate(40,40)">
    <rect width="320" height="200" rx="26" fill="#232634" stroke="#8caaee" stroke-opacity="0.2" stroke-width="1.5"/>
    <!-- header -->
    <g transform="translate(160,46)">
      <path d="M -66 -6 a 8 8 0 1 0 8 12 a 10 10 0 1 1 -8 -12 z" fill="#8caaee"/>
      <text x="-48" y="5" fill="#8caaee" font-size="15" font-weight="700" letter-spacing="0.5">Sleep Timer</text>
    </g>
    <text x="160" y="118" fill="#8caaee" font-size="46" font-weight="700" text-anchor="middle">59:30</text>
    <rect x="90" y="140" width="140" height="40" rx="20" fill="#353a4f"/>
    <text x="160" y="166" fill="#c6d0f5" font-size="15" font-weight="700" text-anchor="middle">Cancel</text>
  </g>
  <text x="200" y="272" fill="#a5adce" font-size="13" text-anchor="middle">Running</text>

  <!-- IDLE STATE -->
  <g transform="translate(400,40)">
    <rect width="320" height="200" rx="26" fill="#232634" stroke="#8caaee" stroke-opacity="0.2" stroke-width="1.5"/>
    <g transform="translate(160,46)">
      <path d="M -66 -6 a 8 8 0 1 0 8 12 a 10 10 0 1 1 -8 -12 z" fill="#8caaee"/>
      <text x="-48" y="5" fill="#8caaee" font-size="15" font-weight="700" letter-spacing="0.5">Sleep Timer</text>
    </g>
    <text x="160" y="92" fill="#a5adce" font-size="13" text-anchor="middle">Tap a preset to start</text>
    <g fill="#353a4f">
      <rect x="26" y="120" width="82" height="44" rx="18" stroke="#8caaee" stroke-width="1.2"/>
      <rect x="119" y="120" width="82" height="44" rx="18" stroke="#8caaee" stroke-width="1.2"/>
      <rect x="212" y="120" width="82" height="44" rx="18" stroke="#8caaee" stroke-width="1.2"/>
    </g>
    <g fill="#c6d0f5" font-size="15" font-weight="700" text-anchor="middle">
      <text x="67" y="147">15m</text>
      <text x="160" y="147">30m</text>
      <text x="253" y="147">60m</text>
    </g>
  </g>
  <text x="560" y="272" fill="#a5adce" font-size="13" text-anchor="middle">Idle</text>

  <text x="380" y="330" fill="#6b7089" font-size="12" text-anchor="middle">Content is now vertically centered as one group — no more empty space pooling at the bottom.</text>
</svg>
